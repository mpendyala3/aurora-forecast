<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#07111f" />
    <meta name="description" content="Suggest a trusted aurora tour operator to Aurora Hunt with this short form, helping us expand useful local options for skywatchers and trip planning quickly." />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://aurorahunt.live/submit-operator.html" />
    <meta property="og:title" content="Aurora Forecast Submit Operator to Aurora Hunt | Aurora Hunt" />
    <meta property="og:description" content="Suggest a trusted aurora tour operator to Aurora Hunt with this short form, helping us expand useful local options for skywatchers and trip planning quickly." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://aurorahunt.live/submit-operator.html" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Aurora Forecast Submit Operator to Aurora Hunt | Aurora Hunt" />
    <meta name="twitter:description" content="Suggest a trusted aurora tour operator to Aurora Hunt with this short form, helping us expand useful local options for skywatchers and trip planning quickly." />
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg?v=4" />
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png" />
    <link rel="apple-touch-icon" href="assets/apple-touch-icon.png" />
    <link rel="manifest" href="site.webmanifest" />
    <script>
      (() => {
        try {
          const raw = localStorage.getItem('aurora-forecast-v1');
          const saved = raw ? JSON.parse(raw) : null;
          const pref = saved?.themePreference || 'system';
          const theme = pref === 'system'
            ? (window.matchMedia?.('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
            : pref;
          document.documentElement.dataset.theme = theme;
          const meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute('content', theme === 'light' ? '#eef4ff' : '#07111f');
        } catch {
          document.documentElement.dataset.theme = 'dark';
        }
      })();
    </script>
    <title>Aurora Forecast Submit Operator to Aurora Hunt | Aurora Hunt</title>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebPage",
        "name": "Aurora Forecast Submit Operator to Aurora Hunt | Aurora Hunt",
        "url": "https://aurorahunt.live/submit-operator.html",
        "description": "Suggest a trusted aurora tour operator to Aurora Hunt with this short form, helping us expand useful local options for skywatchers and trip planning quickly."
      }
    </script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="stars" aria-hidden="true"></div>
    <header>
      <nav class="topbar" aria-label="Primary">
        <a class="brand" href="index.html" aria-label="Aurora Hunt home">
          <span class="brand-mark"><img src="assets/logo.svg?v=4" alt="" aria-hidden="true" /></span>
          <span>Aurora Hunt</span>
        </a>
        <div class="nav-links">
          <a href="index.html">Home</a>
          <a href="index.html#tours">Tours</a>
        </div>
      </nav>
    </header>

    <main class="page-main">
      <section class="card page-hero">
        <p class="eyebrow">Tours</p>
        <h1>Submit a new operator</h1>
        <p class="lede">Suggest a reputable aurora tour company or operator.</p>
      </section>

      <section class="card page-card">
        <form id="tourForm" class="tour-form" action="https://formspree.io/f/mjglerqr" method="POST" data-formspree>
          <label>
            Operator / company name
            <input id="tourNameInput" name="operator_name" type="text" required />
          </label>

          <label>
            Website
            <input id="tourWebsiteInput" name="website" type="url" placeholder="https://example.com" required />
          </label>

          <label>
            Region
            <input id="tourRegionInput" name="region" type="text" required />
          </label>

          <label>
            Contact email
            <input id="tourEmailInput" name="contact_email" type="email" placeholder="hello@example.com" autocomplete="off" />
          </label>

          <label>
            Type of tour
            <select id="tourTypeInput" name="tour_type">
              <option value="" selected disabled hidden>Select an option</option>
              <option>Aurora chase</option>
              <option>Northern lights cruise</option>
              <option>Private tour</option>
              <option>Photography tour</option>
              <option>Multi-day package</option>
            </select>
          </label>

          <label>
            Short description
            <textarea id="tourDescriptionInput" name="description" rows="4" placeholder="What makes this operator stand out?"></textarea>
          </label>

          <button type="submit" class="button primary">Submit operator</button>
        </form>
        <noscript><p class="page-note">This form still works without JavaScript.</p></noscript>
        <div class="page-note" id="tourStatus">We’ll review submissions after they’re sent.</div>
      </section>

    </main>

    <footer class="footer">
      <div class="footer-bottom">
        <p>Built for aurora hunters who want something cleaner than a cluttered app.</p>
        <a href="index.html">Back home</a>
      </div>
    </footer>

    <script>
      const els = {
        tourForm: document.querySelector('#tourForm'),
        tourNameInput: document.querySelector('#tourNameInput'),
        tourWebsiteInput: document.querySelector('#tourWebsiteInput'),
        tourRegionInput: document.querySelector('#tourRegionInput'),
        tourEmailInput: document.querySelector('#tourEmailInput'),
        tourTypeInput: document.querySelector('#tourTypeInput'),
        tourDescriptionInput: document.querySelector('#tourDescriptionInput'),
        tourStatus: document.querySelector('#tourStatus'),
      };

      els.tourForm.addEventListener('submit', async (event) => {
        event.preventDefault();
        let website = els.tourWebsiteInput.value.trim();
        try {
          const parsed = new URL(website);
          if (!['http:', 'https:'].includes(parsed.protocol)) throw new Error('Invalid protocol');
          website = parsed.href;
        } catch {
          alert('Please enter a valid website URL starting with http:// or https://');
          return;
        }
        const formData = new FormData(els.tourForm);
        formData.set('_subject', 'Aurora Hunt operator submission');
        formData.set('website', website);

        const response = await fetch('https://formspree.io/f/mjglerqr', {
          method: 'POST',
          headers: { Accept: 'application/json' },
          body: formData,
        }).catch(() => null);

        if (response?.ok) {
          els.tourForm.reset();
          els.tourStatus.textContent = 'Submission sent successfully.';
          return;
        }

        els.tourStatus.textContent = 'Something hiccupped. Please try again in a moment.';
      });
    </script>
  </body>
</html>
